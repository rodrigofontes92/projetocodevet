{% extends "base.html" %}
<!--
  Este template herda a estrutura base da aplicação (base.html), reutilizando menu, rodapé e estilos globais.
-->

{% block title %}Mudar Password{% endblock %}
<!--
  Define o título específico da página de alteração de password.
-->

{% block content %}
<!--
  Início do conteúdo específico da página de alteração de password.
-->

<h1>🔁 Mudar Password</h1>
<!--
  Título principal da página.
-->

<form method="POST" action="{{ url_for('mudar_password') }}">
  <!--
    Formulário enviado via método POST.
    A ação é tratada pela rota /mudar_password no backend.
  -->

  <p>
    Password atual:<br>
    <!--
      Campo para introdução da password atual do cliente.
      Utilizado para validação antes da alteração.
    -->
    <input
      type="password"
      name="password_atual"
      required
    >
  </p>

  <p>
    Nova password:<br>
    <!--
      Campo para introdução da nova password.
      Deve ser diferente da password atual, conforme validação no backend.
    -->
    <input
      type="password"
      name="nova_password"
      required
    >
  </p>

  <!-- Botão para submeter o formulário -->
  <button type="submit">Alterar Password</button>

  <!-- Link para cancelar e retornar ao dashboard -->
  <a href="{{ url_for('dashboard') }}">Cancelar</a>
</form>

{% endblock %}
<!--
  Fim do conteúdo específico da página de alteração de password.
-->
